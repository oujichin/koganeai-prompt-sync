name: Sync Prompt Templates

on:
  schedule:
    # 毎日 AM9:00 JST (= AM0:00 UTC) に実行
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 手動実行も可能

permissions:
  contents: write
  issues: write

env:
  SOURCE_URL: https://raw.githubusercontent.com/yujiuchi/gptprompt_helper/main/prompt_template.json
  TARGET_FILE: prompt_template.json

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch & Validate
        id: validate
        run: python scripts/validate_and_sync.py

      - name: Commit & Push (if updated)
        if: steps.validate.outputs.updated == 'true'
        run: |
          git config user.name "prompt-sync-bot"
          git config user.email "bot@tsukimi-ai.example"
          git add ${{ env.TARGET_FILE }}
          git commit -m "chore: sync prompt_template.json ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git push

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let errorDetail = 'Unknown error';
            try {
              errorDetail = fs.readFileSync('/tmp/validation_error.txt', 'utf8');
            } catch {}
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ プロンプトテンプレート同期エラー',
              body: [
                '自動同期でエラーが発生しました。',
                '',
                '**エラー内容:**',
                '```',
                errorDetail,
                '```',
                '',
                `**ソース:** ${process.env.SOURCE_URL}`,
                `**実行:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ].join('\n'),
              labels: ['bug', 'auto-sync'],
            });